<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qur'an Hifz: Ultimate Fix</title>
    <style>
        :root {
            --primary-gold: #FFD700;
            --primary-dark: #0b0d0e;
            --main-bg: linear-gradient(to bottom, #0b0d0e 0%, #1a1c1e 100%);
            --surface: #1A1C1E;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-bg-alt: rgba(0, 0, 0, 0.2);
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
            --accent-green: #00FFA3;
            --danger: #FF4D6D;
            --sidebar-width: 280px;
            --streak-gradient: linear-gradient(45deg, #FF512F, #DD2476);
        }

        body.light-mode {
            --primary-gold: #B8860B; 
            --primary-dark: #F0F2F5;
            --main-bg: linear-gradient(to bottom, #f0f2f5 0%, #ffffff 100%);
            --surface: #FFFFFF;
            --card-bg: #ffffff;
            --card-bg-alt: #f5f5f5;
            --text-main: #1A1C1E;
            --text-dim: #5F6368;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0; padding: 0; background: var(--main-bg);
            color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            display: flex; flex-direction: row; min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .info-card, .context-card, .pill-btn, .sidebar, .search-box {
            transition: background 0.3s ease, color 0.3s ease, border 0.3s ease, transform 0.2s ease;
        }

        #testArea { background: linear-gradient(145deg, var(--card-bg) 0%, var(--card-bg-alt) 100%); }

        .surah-grid::-webkit-scrollbar { width: 6px; }
        .surah-grid::-webkit-scrollbar-thumb { background: var(--primary-gold); border-radius: 10px; }

        .sidebar {
            width: var(--sidebar-width); background: var(--surface);
            border-left: 1px solid rgba(128,128,128,0.1);
            display: flex; flex-direction: column; padding: 25px;
            position: sticky; top: 0; height: 100vh; z-index: 1000;
        }
        .sidebar-logo { color: var(--primary-gold); font-size: 1.6rem; font-weight: bold; margin-bottom: 40px; text-align: center; }
        .sidebar-nav-item {
            padding: 14px 18px; border-radius: 12px; margin-bottom: 8px;
            cursor: pointer; color: var(--text-dim); display: flex; align-items: center; gap: 12px;
        }
        .sidebar-nav-item.active { background: var(--primary-gold); color: #000; font-weight: bold; }

        .main-content { flex: 1; padding: 40px; max-width: 1000px; margin: 0 auto; width: 100%; }

        .info-card {
            background: var(--card-bg); border-radius: 24px; padding: 25px;
            margin-bottom: 30px; border: 1px solid rgba(128,128,128,0.1);
        }

        .search-box {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2);
            background: var(--card-bg-alt); color: var(--text-main); margin-bottom: 15px;
        }

        .surah-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px; max-height: 250px; overflow-y: auto; padding: 15px;
            background: var(--card-bg-alt); border-radius: 15px;
        }

        .pill-btn {
            background: var(--primary-gold); color: #000; border: none;
            padding: 12px 24px; border-radius: 50px; font-weight: bold; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }

        .streak-badge { background: var(--streak-gradient); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; }

        .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .main-content { padding: 20px 15px 100px; }
        }
    </style>
</head>
<body>

    <audio id="player" crossOrigin="anonymous"></audio>

    <aside class="sidebar">
        <div class="sidebar-logo">مُسْلِم 🌙</div>
        <div class="sidebar-nav-item active" onclick="switchTab('home', this)">🏠 الرئيسية</div>
        <div class="sidebar-nav-item" onclick="switchTab('test', this)">🎯 اختبار الحفظ</div>
        <div class="sidebar-nav-item" onclick="switchTab('read', this)">📖 المصحف</div>
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(128,128,128,0.1);">
            <button class="pill-btn" style="width: 100%; background: var(--card-bg-alt); color: var(--text-main);" onclick="toggleTheme()">🌓 المظهر</button>
        </div>
    </aside>

    <main class="main-content">
        <section id="view-home" class="view-section active">
            <h1>أهلاً بك</h1>
            <div class="info-card" style="background: var(--primary-gold); color: #000; display: flex; justify-content: space-between; align-items: center;">
                <div><h3 style="margin:0;">تحفيز اليوم 🚀</h3><p id="streak-text" style="margin: 5px 0 0 0; opacity: 0.9;">بانتظار إنجازك اليوم!</p></div>
                <div class="streak-badge" id="streak-val">0 يوم</div>
            </div>
            <div class="info-card">
                <h3>الجلسة الحالية</h3>
                <p>عدد السور المختارة: <span id="selected-count" style="font-weight:bold; color:var(--primary-gold)">0</span></p>
                <button class="pill-btn" onclick="switchTab('test')">انتقل للاختبار</button>
            </div>
        </section>

        <section id="view-test" class="view-section">
            <h2 style="color:var(--primary-gold)">🎯 اختبار الحفظ</h2>
            <div class="info-card">
                <input type="text" id="surahSearch" class="search-box" placeholder="🔍 ابحث عن سورة..." oninput="filterSurahs()">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <button onclick="toggleSurahs(true)" class="pill-btn" style="padding:5px 15px; font-size:0.8rem;">تحديد الكل</button>
                    <button onclick="toggleSurahs(false)" class="pill-btn" style="padding:5px 15px; font-size:0.8rem; background:#444; color:#fff;">إلغاء الكل</button>
                </div>
                <div class="surah-grid" id="surahList"></div>
            </div>
            
            <div class="info-card" id="testArea" style="text-align:center; min-height: 350px;">
                <div id="cardContent"><p style="opacity:0.5;">اختر السور ثم اضغط آية عشوائية.</p></div>
                <div id="revealControls" style="display:none; margin-top:20px;">
                    <div id="fullReveal" style="font-size:1.8rem; line-height:1.6; margin-bottom:20px;"></div>
                    <button id="audioBtn" class="pill-btn" style="background:transparent; border:2px solid var(--primary-gold); color:var(--primary-gold);" onclick="playAudio()">🔊 تلاوة الآية</button>
                    <div id="prevAyahBox" class="context-card" style="font-size:0.9rem; opacity:0.8;"></div>
                    <div id="nextAyahBox" class="context-card" style="font-size:0.9rem; opacity:0.8;"></div>
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <button class="pill-btn" style="background:var(--accent-green); flex:1" onclick="generateTest()">✅ أتقنت</button>
                        <button class="pill-btn" style="background:var(--danger); color:white; flex:1" onclick="generateTest()">❌ مراجعة</button>
                    </div>
                </div>
            </div>
            <div id="testActions" style="text-align:center; margin-top:20px;">
                <button class="pill-btn" onclick="generateTest()">✨ آية عشوائية</button>
                <button class="pill-btn" style="background:transparent; border:2px solid var(--primary-gold); color:var(--primary-gold); margin-right:10px;" onclick="reveal()">👁 كشف الآية</button>
            </div>
        </section>

        <section id="view-read" class="view-section">
            <h2 style="color:var(--primary-gold)">📖 مراجعة المصحف</h2>
            <select id="mushafSelect" class="search-box" onchange="loadSurahToMushaf()"></select>
            <div id="mushaf-content"></div>
        </section>
    </main>

    <script>
        let quran = [];
        let currentIdx = -1;

        // تفعيل الصوت برمجياً مع أول لمسة للمستخدم
        const enableAudio = () => {
            const p = document.getElementById('player');
            p.play().then(() => p.pause()).catch(() => {});
            document.removeEventListener('click', enableAudio);
        };
        document.addEventListener('click', enableAudio);

        fetch('fullquran_fixed.json').then(r => r.json()).then(data => { 
            quran = data; 
            initApp();
            initStreak();
        });

        function playAudio() {
            if (currentIdx === -1) return;
            const player = document.getElementById('player');
            const btn = document.getElementById('audioBtn');
            
            // رابط مباشر وسريع
            const url = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${currentIdx + 1}.mp3`;
            
            btn.innerText = "⏳ جاري التحميل...";
            player.pause();
            player.src = url;
            player.load();

            player.play()
                .then(() => { btn.innerText = "🔊 تلاوة الآية"; })
                .catch(e => {
                    console.error(e);
                    btn.innerText = "🔊 حاول مرة أخرى";
                    // محاولة أخيرة: تشغيل صامت لفتح الإذن
                    player.muted = true;
                    player.play().then(() => { player.muted = false; });
                });
        }

        function generateTest() {
            document.getElementById('player').pause();
            const selected = Array.from(document.querySelectorAll('#surahList input:checked')).map(i => i.value);
            if(!selected.length) return alert("اختر سورة أولاً");

            const pool = quran.map((v, i) => selected.includes(v.surah) ? i : -1).filter(i => i !== -1);
            currentIdx = pool[Math.floor(Math.random() * pool.length)];
            const a = quran[currentIdx];

            document.getElementById('cardContent').innerHTML = `
                <div style="color:var(--primary-gold); margin-bottom:10px;">${a.surah} | آية ${a.ayah_num}</div>
                <div style="font-size:2rem;">${a.start} ...</div>
            `;
            document.getElementById('revealControls').style.display = 'none';
            document.getElementById('testActions').style.display = 'block';
        }

        function reveal() {
            if(currentIdx === -1) return;
            const a = quran[currentIdx];
            document.getElementById('fullReveal').innerText = a.full;
            
            const prev = quran[currentIdx - 1];
            const next = quran[currentIdx + 1];
            document.getElementById('prevAyahBox').innerHTML = (prev && prev.surah === a.surah) ? `<hr><small>السابقة: ${prev.full}</small>` : "";
            document.getElementById('nextAyahBox').innerHTML = (next && next.surah === a.surah) ? `<hr><small>التالية: ${next.full}</small>` : "";
            
            document.getElementById('revealControls').style.display = 'block';
            document.getElementById('testActions').style.display = 'none';
        }

        function initApp() {
            const names = [...new Set(quran.map(x => x.surah))];
            document.getElementById('surahList').innerHTML = names.map(n => `<label style="display:flex;gap:5px;"><input type="checkbox" checked value="${n}" onchange="updateSelectedCount()"> ${n}</label>`).join('');
            document.getElementById('mushafSelect').innerHTML = '<option value="">اختر سورة...</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('');
            updateSelectedCount();
        }

        function switchTab(t, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            document.querySelectorAll('.sidebar-nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function toggleSurahs(v) { document.querySelectorAll('#surahList input').forEach(i => i.checked = v); updateSelectedCount(); }
        function updateSelectedCount() { document.getElementById('selected-count').innerText = document.querySelectorAll('#surahList input:checked').length; }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function filterSurahs() {
            const t = document.getElementById('surahSearch').value;
            document.querySelectorAll('#surahList label').forEach(l => l.style.display = l.innerText.includes(t) ? "flex" : "none");
        }
        function loadSurahToMushaf() {
            const s = document.getElementById('mushafSelect').value;
            document.getElementById('mushaf-content').innerHTML = quran.filter(v => v.surah === s).map(a => `<div class="info-card"><small>${a.ayah_num}</small><br>${a.full}</div>`).join('');
        }
        function initStreak() {
            const today = new Date().toDateString();
            const last = localStorage.getItem('hifz_last');
            let s = parseInt(localStorage.getItem('hifz_s')) || 0;
            if(last !== today) { s = (last === new Date(Date.now()-86400000).toDateString()) ? s+1 : 1; localStorage.setItem('hifz_s', s); localStorage.setItem('hifz_last', today); }
            document.getElementById('streak-val').innerText = s + " يوم";
        }
    </script>
</body>
</html>
