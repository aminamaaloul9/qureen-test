<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qur'an Hifz: Final Edition</title>
    <style>
        :root {
            --primary-gold: #FFD700;
            --primary-dark: #0b0d0e;
            --main-bg: linear-gradient(to bottom, #0b0d0e 0%, #1a1c1e 100%);
            --surface: #1A1C1E;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-bg-alt: rgba(0, 0, 0, 0.2);
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
            --accent-green: #00FFA3;
            --danger: #FF4D6D;
            --sidebar-width: 280px;
            --streak-gradient: linear-gradient(45deg, #FF512F, #DD2476);
        }

        body.light-mode {
            --primary-gold: #B8860B; 
            --primary-dark: #F0F2F5;
            --main-bg: linear-gradient(to bottom, #f0f2f5 0%, #ffffff 100%);
            --surface: #FFFFFF;
            --card-bg: #ffffff;
            --card-bg-alt: #f5f5f5;
            --text-main: #1A1C1E;
            --text-dim: #5F6368;
            --streak-gradient: linear-gradient(45deg, #B8860B, #DAA520);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background: var(--main-bg);
            color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            display: flex; flex-direction: row; min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* UI Improvements */
        .info-card, .context-card, .pill-btn, .sidebar, .search-box {
            transition: background 0.3s ease, color 0.3s ease, border 0.3s ease, transform 0.2s ease;
        }

        #testArea { background: linear-gradient(145deg, var(--card-bg) 0%, var(--card-bg-alt) 100%); }

        .surah-grid::-webkit-scrollbar { width: 8px; }
        .surah-grid::-webkit-scrollbar-thumb { background: var(--primary-gold); border-radius: 4px; }
        .surah-grid::-webkit-scrollbar-track { background: var(--card-bg-alt); }

        .sidebar {
            width: var(--sidebar-width); background: var(--surface);
            border-left: 1px solid rgba(128,128,128,0.1);
            display: flex; flex-direction: column; padding: 25px;
            position: sticky; top: 0; height: 100vh; z-index: 1000;
        }
        .sidebar-logo { color: var(--primary-gold); font-size: 1.6rem; font-weight: bold; margin-bottom: 40px; text-align: center; }
        .sidebar-nav-item {
            padding: 14px 18px; border-radius: 12px; margin-bottom: 8px;
            cursor: pointer; color: var(--text-dim); display: flex; align-items: center; gap: 12px;
        }
        .sidebar-nav-item:hover { background: rgba(128,128,128,0.08); color: var(--text-main); }
        .sidebar-nav-item.active { background: var(--primary-gold); color: #000; font-weight: bold; }

        .main-content { flex: 1; padding: 40px; max-width: 1000px; margin: 0 auto; }

        .info-card {
            background: var(--card-bg); border-radius: 24px; padding: 25px;
            margin-bottom: 30px; border: 1px solid rgba(128,128,128,0.1);
        }

        .search-box {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2);
            background: var(--card-bg-alt); color: var(--text-main); margin-bottom: 15px;
        }

        .surah-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px; max-height: 250px; overflow-y: auto; padding: 15px;
            background: var(--card-bg-alt); border-radius: 15px;
        }

        .pill-btn {
            background: var(--primary-gold); color: #000; border: none;
            padding: 12px 24px; border-radius: 50px; font-weight: bold; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .pill-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .pill-btn:active { transform: scale(0.96); }

        .context-card {
            background: var(--card-bg-alt); padding: 18px; border-radius: 18px;
            text-align: right; margin-top: 12px; border: 1px solid rgba(128,128,128,0.1);
        }

        .streak-badge { background: var(--streak-gradient); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }

        .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .main-content { padding: 20px 15px 100px; }
        }
    </style>
</head>
<body>

    <audio id="player" preload="auto"></audio>

    <aside class="sidebar">
        <div class="sidebar-logo">مُسْلِم 🌙</div>
        <div class="sidebar-nav-item active" onclick="switchTab('home', this)">🏠 الرئيسية</div>
        <div class="sidebar-nav-item" onclick="switchTab('test', this)">🎯 اختبار الحفظ</div>
        <div class="sidebar-nav-item" onclick="switchTab('read', this)">📖 المصحف</div>
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(128,128,128,0.1);">
            <button class="pill-btn" style="width: 100%; background: var(--card-bg-alt); color: var(--text-main);" onclick="toggleTheme()">🌓 تبديل المظهر</button>
        </div>
    </aside>

    <main class="main-content">
        <section id="view-home" class="view-section active">
            <h1>أهلاً بك</h1>
            <div class="info-card" style="background: var(--primary-gold); color: #000; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 style="margin:0;">تحفيز اليوم 🚀</h3>
                    <p id="streak-text" style="margin: 5px 0 0 0; opacity: 0.9;">أنت في بداية الطريق!</p>
                </div>
                <div class="streak-badge" id="streak-val">0 يوم</div>
            </div>
            <div class="info-card">
                <h3>إحصائيات الجلسة 📊</h3>
                <p style="color: var(--text-dim);">عدد السور المحددة للاختبار: <span id="selected-count" style="color: var(--primary-gold); font-weight: bold;">0</span></p>
                <button class="pill-btn" onclick="switchTab('test')">ابدأ المراجعة الآن</button>
            </div>
        </section>

        <section id="view-test" class="view-section">
            <h2 style="color:var(--primary-gold)">🎯 مركز الاختبار</h2>
            <div class="info-card">
                <input type="text" id="surahSearch" class="search-box" placeholder="🔍 ابحث عن سورة..." oninput="filterSurahs()">
                <div style="display:flex; justify-content:space-between; margin-bottom: 12px;">
                    <button onclick="toggleSurahs(true)" class="pill-btn" style="padding:6px 18px; font-size: 0.85em;">تحديد الكل</button>
                    <button onclick="toggleSurahs(false)" class="pill-btn" style="padding:6px 18px; font-size: 0.85em; background:var(--card-bg-alt); color:var(--text-main);">إلغاء الكل</button>
                </div>
                <div class="surah-grid" id="surahList"></div>
            </div>
            
            <div class="info-card" id="testArea" style="text-align:center; min-height: 320px;">
                <div id="cardContent"><p style="opacity:0.5;">اختر السور ثم اضغط آية عشوائية.</p></div>
                
                <div id="revealControls" style="display:none; margin-top:25px;">
                    <div id="fullReveal" style="font-size:1.8rem; line-height:1.8; margin-bottom:25px; color:var(--text-main);"></div>
                    <button id="audioBtn" class="pill-btn" style="background:transparent; border:2px solid var(--primary-gold); color:var(--primary-gold);" onclick="playAudio()">🔊 تلاوة الآية</button>
                    <div class="context-area" style="margin-top: 25px;">
                        <div id="prevAyahBox" class="context-card"></div>
                        <div id="nextAyahBox" class="context-card"></div>
                    </div>
                    <div style="display:flex; gap:15px; margin-top:30px;">
                        <button class="pill-btn" style="background:var(--accent-green); flex:1" onclick="generateTest()">✅ أتقنت</button>
                        <button class="pill-btn" style="background:var(--danger); color:white; flex:1" onclick="generateTest()">❌ مراجعة</button>
                    </div>
                </div>
            </div>
            <div style="margin-top:25px; text-align:center;" id="testActions">
                <button class="pill-btn" onclick="generateTest()">✨ آية عشوائية</button>
                <button class="pill-btn" style="background:transparent; border:2px solid var(--primary-gold); color:var(--primary-gold); margin-right: 10px;" onclick="reveal()">👁 كشف الآية</button>
            </div>
        </section>

        <section id="view-read" class="view-section">
            <h2 style="color:var(--primary-gold)">📖 المصحف الشريف</h2>
            <select id="mushafSelect" class="search-box" onchange="loadSurahToMushaf()"></select>
            <div id="mushaf-content"></div>
        </section>
    </main>

    <script>
        let quran = [];
        let currentIdx = -1;

        // تهيئة الصوت عند أول تفاعل
        document.body.addEventListener('click', () => {
            const p = document.getElementById('player');
            if (p.paused && !p.src) {
                p.muted = true;
                p.play().then(() => { p.pause(); p.muted = false; }).catch(()=>{});
            }
        }, { once: true });

        fetch('fullquran_fixed.json').then(r => r.json()).then(data => { 
            quran = data; 
            initApp();
            initStreak();
        });

        function initApp() {
            const names = [...new Set(quran.map(x => x.surah))];
            const list = document.getElementById('surahList');
            list.innerHTML = names.map(n => `<label class="surah-item" style="display:flex; align-items:center; gap:8px;"><input type="checkbox" checked value="${n}" onchange="updateSelectedCount()"> ${n}</label>`).join('');
            
            const select = document.getElementById('mushafSelect');
            select.innerHTML = '<option value="">اختر سورة للعرض...</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('');
            updateSelectedCount();
        }

        function playAudio() {
            if (currentIdx === -1) return;
            const player = document.getElementById('player');
            
            // استخدام رابط EveryAyah الموثوق
            const audioUrl = `https://everyayah.com/data/Alafasy_128kbps/${String(currentIdx + 1).padStart(3, '0')}.mp3`;

            player.pause();
            player.src = audioUrl;
            player.load();
            
            player.play().catch(err => {
                console.error("Audio blocked:", err);
                alert("يرجى النقر في أي مكان على الصفحة لتفعيل الصوت.");
            });
        }

        function generateTest() {
            document.getElementById('player').pause();
            const selected = Array.from(document.querySelectorAll('#surahList input:checked')).map(i => i.value);
            if(!selected.length) return alert("يرجى اختيار سورة");

            const pool = quran.map((v, i) => selected.includes(v.surah) ? i : -1).filter(i => i !== -1);
            currentIdx = pool[Math.floor(Math.random() * pool.length)];
            const ayah = quran[currentIdx];

            document.getElementById('cardContent').innerHTML = `
                <div style="color:var(--primary-gold); font-weight:bold;">${ayah.surah} • آية ${ayah.ayah_num}</div>
                <div style="font-size:1.8rem; margin-top:20px;">${ayah.start} ...</div>
            `;
            document.getElementById('revealControls').style.display = 'none';
            document.getElementById('testActions').style.display = 'block';
        }

        function reveal() {
            if(currentIdx === -1) return;
            const ayah = quran[currentIdx];
            document.getElementById('fullReveal').innerText = ayah.full;
            
            const prev = quran[currentIdx - 1];
            const next = quran[currentIdx + 1];
            document.getElementById('prevAyahBox').innerHTML = (prev && prev.surah === ayah.surah) ? `<small style="color:var(--primary-gold)">السابق:</small><br>${prev.full}` : "";
            document.getElementById('nextAyahBox').innerHTML = (next && next.surah === ayah.surah) ? `<small style="color:var(--primary-gold)">التالي:</small><br>${next.full}` : "";
            
            document.getElementById('revealControls').style.display = 'block';
            document.getElementById('testActions').style.display = 'none';
        }

        // باقي الوظائف (Themes, Tabs, etc.)
        function switchTab(t, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            document.querySelectorAll('.sidebar-nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function toggleSurahs(v) { document.querySelectorAll('#surahList input').forEach(i => i.checked = v); updateSelectedCount(); }
        function updateSelectedCount() { document.getElementById('selected-count').innerText = document.querySelectorAll('#surahList input:checked').length; }
        function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('hifz_theme', document.body.classList.contains('light-mode')?'light':'dark'); }
        function filterSurahs() {
            const term = document.getElementById('surahSearch').value.toLowerCase();
            document.querySelectorAll('.surah-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(term) ? "flex" : "none");
        }
        function loadSurahToMushaf() {
            const target = document.getElementById('mushafSelect').value;
            const filtered = quran.filter(v => v.surah === target);
            document.getElementById('mushaf-content').innerHTML = filtered.map(a => `<div class="info-card"><small>${a.ayah_num}</small><br>${a.full}</div>`).join('');
        }
        function initStreak() {
            const streak = updateStreak();
            document.getElementById('streak-val').innerText = streak + " يوم";
        }
        function updateStreak() {
            const today = new Date().toDateString();
            const last = localStorage.getItem('hifz_last_date');
            let s = parseInt(localStorage.getItem('hifz_streak')) || 0;
            if (last !== today) { s = (last === new Date(Date.now()-86400000).toDateString()) ? s+1 : 1; localStorage.setItem('hifz_streak', s); localStorage.setItem('hifz_last_date', today); }
            return s;
        }
        if(localStorage.getItem('hifz_theme') === 'light') document.body.classList.add('light-mode');
    </script>
</body>
</html>
